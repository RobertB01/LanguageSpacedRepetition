<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Spanish Vocabulary Trainer — Learn 500 core Spanish words with English and Dutch translations, spaced repetition, active recall, and text-to-speech." />
  <meta name="theme-color" content="#f7f7f8" />
  <title>Language SRS — Spanish Vocabulary</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <nav class="app-nav">
      <div class="app-title">Triolingo</div>
      <div class="nav-buttons">
        <button class="nav-btn active" data-view="study" id="nav-study">Study</button>
        <button class="nav-btn" data-view="progress" id="nav-progress">Progress</button>
        <button class="nav-btn" data-view="verbs" id="nav-verbs">Verbs</button>
        <button class="nav-btn" data-view="read" id="nav-read">Read</button>
        <button class="nav-btn" data-view="reference" id="nav-reference">Reference</button>
        <button class="nav-btn" data-view="chat" id="nav-chat">Chat</button>
        <button class="nav-btn" data-view="games" id="nav-games">Games</button>
        <button class="nav-btn" data-view="settings" id="nav-settings">Settings</button>
        <button class="nav-btn theme-toggle" id="btn-theme" title="Toggle theme">🌙</button>
        <button class="nav-btn profile-btn" id="btn-profile" title="Switch profile">👤</button>
      </div>
    </nav>

    <main id="main-content">
      <div class="empty-state">
        <p>Loading...</p>
      </div>
    </main>
  </div>

  <!-- Scripts: loaded in dependency order -->
  <script>
    // Theme: restore before render (default is light)
    (function() {
      const saved = localStorage.getItem('srs_theme') || 'light';
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>

  <script src="vocabulary.js"></script>
  <script src="conjugations.js"></script>
  <script src="profiles.js"></script>
  <!-- Supabase SDK + cloud sync (config file is git-ignored; copy supabase-config.example.js
       to supabase-config.js and fill in your keys. If absent, app runs localStorage-only.) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js" onerror="console.info('No supabase-config.js — running in localStorage-only mode.')"></script>
  <script src="cloud.js"></script>
  <!-- OpenAI (config file is git-ignored; copy openai-config.example.js
       to openai-config.js and fill in your key. If absent, AI features are disabled.) -->
  <script src="openai-config.js" onerror="console.info('No openai-config.js — AI features disabled.')"></script>
  <script src="ai.js"></script>
  <script src="srs.js"></script>
  <script src="tts.js"></script>
  <script src="chatbot.js"></script>
  <script src="reading.js"></script>
  <script src="reference.js"></script>
  <script src="games/guess-who.js"></script>
  <script src="app.js"></script>
  <script>
    // Boot the app
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize cloud sync (no-op if supabase-config.js missing).
      if (typeof Cloud !== 'undefined') Cloud.init();
      if (typeof AI !== 'undefined') AI.init();

      // Dev-mode banner (only when running on localhost). Lets you toggle
      // between sandbox and production cloud rows, and copy prod → sandbox.
      if (Profiles.IS_LOCAL) renderDevBanner();

      // Check if profile is selected
      if (!Profiles.getActiveProfileId()) {
        App.showProfileSelect();
      }

      // Navigation bindings
      document.getElementById('nav-study').addEventListener('click', () => App.showStudy());
      document.getElementById('nav-progress').addEventListener('click', () => App.showProgress());
      document.getElementById('nav-verbs').addEventListener('click', () => App.showVerbs());
      document.getElementById('nav-read').addEventListener('click', () => App.showReading());
      document.getElementById('nav-reference').addEventListener('click', () => App.showReference());
      document.getElementById('nav-chat').addEventListener('click', () => App.showChat());
      document.getElementById('nav-games').addEventListener('click', () => App.showGames());
      document.getElementById('nav-settings').addEventListener('click', () => App.showSettings());
      document.getElementById('btn-profile').addEventListener('click', () => App.showProfileSelect());

      // Theme toggle
      const themeBtn = document.getElementById('btn-theme');
      function updateThemeBtn() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        themeBtn.textContent = isDark ? '🌙' : '☀️';
      }
      updateThemeBtn();
      themeBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('srs_theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('srs_theme', 'dark');
        }
        updateThemeBtn();
      });

      // Update profile button display
      function updateProfileBtn() {
        const profile = Profiles.getActiveProfile();
        const btn = document.getElementById('btn-profile');
        if (profile) {
          btn.textContent = profile.avatar;
          btn.title = `Profile: ${profile.name}`;
        }
      }
      updateProfileBtn();

      // Enable auto-save for profiles
      Profiles.enableAutoSave();

      // Initialize (only if profile selected)
      if (Profiles.getActiveProfileId()) {
        App.init();
      }
    });

    // Dev banner: shown only on localhost. Lets you safely choose whether
    // your local studying writes back to the cloud or stays local-only.
    function renderDevBanner() {
      const bar = document.createElement('div');
      bar.id = 'dev-banner';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;padding:8px 14px;font-size:13px;font-family:system-ui,sans-serif;z-index:9999;display:flex;gap:14px;align-items:center;box-shadow:0 -2px 6px rgba(0,0,0,.25);';
      function refresh() {
        const saving = Profiles.isCloudSaveEnabled();
        const id = Profiles.getActiveProfileId() || '(no profile)';
        bar.style.background = saving ? '#ff7a7a' : '#7ecf7e';
        bar.style.color = '#111';
        bar.innerHTML = `
          <strong style="font-size:14px;">🧪 LOCAL DEV</strong>
          <span>profile: <b>${id}</b></span>
          <span style="padding:2px 8px;border-radius:4px;background:rgba(0,0,0,.15);font-weight:600;">
            ${saving ? '⚠️ WRITES GO TO CLOUD' : '🔒 LOCAL ONLY (cloud is read-only)'}
          </span>
          <label style="margin-left:auto;cursor:pointer;display:flex;align-items:center;gap:6px;">
            <input type="checkbox" id="dev-save-toggle" ${saving ? 'checked' : ''}/>
            Save to cloud
          </label>
          <button id="dev-reload" style="cursor:pointer;padding:4px 10px;border-radius:4px;border:1px solid rgba(0,0,0,.3);background:rgba(255,255,255,.7);">↻ Reload from cloud</button>
        `;
        bar.querySelector('#dev-save-toggle').addEventListener('change', (e) => {
          if (e.target.checked && !confirm('Turn cloud writes ON? Anything you do here will overwrite your real cloud progress.')) {
            e.target.checked = false;
            return;
          }
          Profiles.setCloudSaveEnabled(e.target.checked);
          refresh();
        });
        bar.querySelector('#dev-reload').addEventListener('click', async () => {
          await SRS.loadFromServer();
          location.reload();
        });
      }
      document.body.appendChild(bar);
      // Add bottom padding so banner doesn't cover content.
      document.body.style.paddingBottom = '52px';
      refresh();
    }
  </script>
</body>
</html>
