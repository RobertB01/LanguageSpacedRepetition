<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Spanish Vocabulary Trainer — Learn 500 core Spanish words with English and Dutch translations, spaced repetition, active recall, and text-to-speech." />
  <meta name="theme-color" content="#f7f7f8" />
  <title>Language SRS — Spanish Vocabulary</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <nav class="app-nav">
      <div class="app-title">Triolingo</div>
      <div class="nav-buttons">
        <button class="nav-btn active" data-view="study" id="nav-study">Study</button>
        <button class="nav-btn" data-view="progress" id="nav-progress">Progress</button>
        <button class="nav-btn" data-view="verbs" id="nav-verbs">Verbs</button>
        <button class="nav-btn" data-view="chat" id="nav-chat">Chat</button>
        <button class="nav-btn" data-view="games" id="nav-games">Games</button>
        <button class="nav-btn" data-view="settings" id="nav-settings">Settings</button>
        <button class="nav-btn theme-toggle" id="btn-theme" title="Toggle theme">🌙</button>
        <button class="nav-btn profile-btn" id="btn-profile" title="Switch profile">👤</button>
      </div>
    </nav>

    <main id="main-content">
      <div class="empty-state">
        <p>Loading...</p>
      </div>
    </main>
  </div>

  <!-- Scripts: loaded in dependency order -->
  <script>
    // Theme: restore before render (default is light)
    (function() {
      const saved = localStorage.getItem('srs_theme') || 'light';
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>

  <script src="vocabulary.js"></script>
  <script src="conjugations.js"></script>
  <script src="profiles.js"></script>
  <script src="srs.js"></script>
  <script src="tts.js"></script>
  <script src="chatbot.js"></script>
  <script src="games/guess-who.js"></script>
  <script src="app.js"></script>
  <script>
    // Boot the app
    document.addEventListener('DOMContentLoaded', () => {
      // Check if profile is selected
      if (!Profiles.getActiveProfileId()) {
        App.showProfileSelect();
      }

      // Navigation bindings
      document.getElementById('nav-study').addEventListener('click', () => App.showStudy());
      document.getElementById('nav-progress').addEventListener('click', () => App.showProgress());
      document.getElementById('nav-verbs').addEventListener('click', () => App.showVerbs());
      document.getElementById('nav-chat').addEventListener('click', () => App.showChat());
      document.getElementById('nav-games').addEventListener('click', () => App.showGames());
      document.getElementById('nav-settings').addEventListener('click', () => App.showSettings());
      document.getElementById('btn-profile').addEventListener('click', () => App.showProfileSelect());

      // Theme toggle
      const themeBtn = document.getElementById('btn-theme');
      function updateThemeBtn() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        themeBtn.textContent = isDark ? '🌙' : '☀️';
      }
      updateThemeBtn();
      themeBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('srs_theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('srs_theme', 'dark');
        }
        updateThemeBtn();
      });

      // Update profile button display
      function updateProfileBtn() {
        const profile = Profiles.getActiveProfile();
        const btn = document.getElementById('btn-profile');
        if (profile) {
          btn.textContent = profile.avatar;
          btn.title = `Profile: ${profile.name}`;
        }
      }
      updateProfileBtn();

      // Enable auto-save for profiles
      Profiles.enableAutoSave();

      // Initialize (only if profile selected)
      if (Profiles.getActiveProfileId()) {
        App.init();
      }
    });
  </script>
</body>
</html>
